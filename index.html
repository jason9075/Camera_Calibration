<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Camera Calibration Lab</title>

  <!-- KaTeX -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
    onload="renderMathInElement(document.body, {
      delimiters: [
        {left: '$$', right: '$$', display: true},
        {left: '$', right: '$', display: false}
      ],
      macros: { '\\R': '\\mathbb{R}' }
    });"></script>

  <!-- Import Maps -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/",
      "lil-gui": "https://cdn.jsdelivr.net/npm/lil-gui@0.19/+esm"
    }
  }
  </script>

  <style>
    :root {
      --nord0:  #2E3440;
      --nord1:  #3B4252;
      --nord2:  #434C5E;
      --nord3:  #4C566A;
      --nord4:  #D8DEE9;
      --nord5:  #E5E9F0;
      --nord6:  #ECEFF4;
      --nord7:  #8FBCBB;
      --nord8:  #88C0D0;
      --nord9:  #81A1C1;
      --nord10: #5E81AC;
      --nord11: #BF616A;
      --nord12: #D08770;
      --nord13: #EBCB8B;
      --nord14: #A3BE8C;
      --nord15: #B48EAD;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      display: flex;
      height: 100vh;
      overflow: hidden;
      background: var(--nord0);
      color: var(--nord4);
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 13px;
    }

    /* ── Main 3D world canvas ── */
    #main {
      flex: 1;
      display: block;
      min-width: 0;
    }

    /* ── Right panel ── */
    #panel {
      width: 660px;
      flex-shrink: 0;
      background: var(--nord1);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      border-left: 1px solid var(--nord3);
    }

    /* lil-gui inside panel */
    #gui-mount .lil-gui {
      position: relative !important;
      width: 100% !important;
    }
    #gui-mount .lil-gui.root {
      border-radius: 0;
      border: none;
      border-bottom: 1px solid var(--nord3);
    }

    /* ── Feed container ── */
    #feed-wrap {
      position: relative;
      width: 640px;
      height: 480px;
      margin: 8px 10px;
      flex-shrink: 0;
      border: 2px solid var(--nord3);
    }

    #feed, #overlay {
      position: absolute;
      top: 0; left: 0;
      width: 640px;
      height: 480px;
    }

    #overlay { pointer-events: none; }

    /* feed label */
    #feed-label {
      position: absolute;
      bottom: 4px;
      left: 6px;
      color: var(--nord8);
      font-size: 0.72rem;
      z-index: 10;
      text-shadow: 0 0 4px var(--nord0);
      pointer-events: none;
    }

    /* ── Status bar ── */
    #status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 10px;
      background: var(--nord2);
      font-size: 0.75rem;
      border-bottom: 1px solid var(--nord3);
      flex-shrink: 0;
    }

    #cv-status { color: var(--nord14); }

    #snap-status { color: var(--nord8); }

    /* ── Result panel ── */
    #result {
      padding: 8px 10px 12px;
      font-size: 0.75rem;
      flex: 1;
      overflow-y: auto;
    }

    #result table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 6px;
    }

    #result th, #result td {
      padding: 3px 8px;
      border: 1px solid var(--nord3);
      text-align: right;
    }

    #result th {
      background: var(--nord2);
      color: var(--nord6);
      text-align: center;
    }

    #result td:first-child { text-align: left; color: var(--nord9); }

    .rms-good  { color: var(--nord14); }
    .rms-warn  { color: var(--nord13); }
    .rms-bad   { color: var(--nord11); }

    /* ── Info overlay on main canvas ── */
    #info {
      position: fixed;
      top: 8px;
      left: 10px;
      color: var(--nord8);
      font-size: 0.75rem;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="main"></canvas>

  <div id="panel">
    <div id="gui-mount"></div>

    <div id="status-bar">
      <span id="snap-status">Snapshots: 0 | Ready</span>
      <span id="cv-status">Zhang's method (pure JS)</span>
    </div>

    <div id="feed-wrap">
      <canvas id="feed" width="640" height="480"></canvas>
      <canvas id="overlay" width="640" height="480"></canvas>
      <div id="feed-label">Camera Feed — Virtual Cam</div>
    </div>

    <div id="result">
      <span style="color:var(--nord3)">Awaiting calibration — take at least 3 snapshots from different angles.</span>
      <p style="margin-top:6px; color:var(--nord3)">
        $f_y = \dfrac{H/2}{\tan(FOV/2)}$
      </p>
    </div>
  </div>

  <div id="info">Camera Calibration Lab | Three.js + OpenCV.js</div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
